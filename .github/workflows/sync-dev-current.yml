name: Sync dev-current with main

on:
  workflow_call: # Allows this to be called by other workflows
  workflow_dispatch: # Allows manual triggering
  pull_request:
    types: [closed]
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-dev-current:
    name: Synchronise dev-current
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Important: fetch all history to compare branches

      - name: Sync branches
        run: |
          set -euo pipefail

          # Fetch latest state of tracking branches
          git fetch origin main dev-current

          # Check if dev-current exists on remote and if it has unmerged work
          if git show-ref --verify --quiet refs/remotes/origin/dev-current; then
            ahead=$(git rev-list --count origin/main..origin/dev-current)
            if [ "$ahead" -gt 0 ]; then
              echo "INFO: dev-current is ahead of main by $ahead commits. Skipping sync."
              git log --oneline origin/main..origin/dev-current
              exit 0
            fi
          fi

          echo "INFO: Syncing dev-current with main..."
          # Checkout main locally, create/reset dev-current to track it, and force push
          git checkout main
          git checkout -B dev-current
          git push origin dev-current --force-with-lease
