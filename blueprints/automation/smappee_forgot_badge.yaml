blueprint:
  name: "Smappee: Forgot to Scan RFID Badge"
  description: "Send a push notification when the charger remains in a connected state without transaction authorization."
  domain: automation
  input:
    charger_status_sensor:
      name: Smappee Charger Status Sensor
      description: The sensor that monitors the active operational status of the charger.
      selector:
        entity:
          filter:
            - domain: sensor
    delay_time:
      name: Delay Time
      description: How long the charger must be connected before sending the alert.
      default: 5
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: minutes
          mode: slider
    notify_device:
      name: Notification Device
      description: The smartphone device that will receive the push notification.
      selector:
        device:
          filter:
            - integration: mobile_app
    notification_title:
      name: Notification Title
      description: The title header text of the push notification message.
      default: "⚡ Smappee: Forgot to badge?"
      selector:
        text:
    notification_message:
      name: Notification Message
      description: "The body text of the message. Use {{ delay_minutes }} to inject the dynamic countdown value."
      default: "The car has been connected for {{ delay_minutes }} minutes, but the charging session has not started. Don't forget to swipe your RFID card!"
      selector:
        text:

trigger:
  - platform: state
    entity_id: !input charger_status_sensor
    to: "cable_connected"
    for:
      minutes: !input delay_time

condition: []

action:
  - domain: mobile_app
    type: notify
    device_id: !input notify_device
    title: !input notification_title
    message: !input notification_message
    data:
      delay_minutes: !input delay_time

mode: single
